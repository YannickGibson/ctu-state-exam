<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a4a8f"/>
      <stop offset="100%" stop-color="#0065BD"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eaf2fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#001a3a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- open book -->
  <g filter="url(#shadow)">
    <!-- left page -->
    <path d="M512 332
             C 430 286, 320 280, 236 300
             L 236 712
             C 320 692, 430 698, 512 744 Z"
          fill="url(#page)"/>
    <!-- right page -->
    <path d="M512 332
             C 594 286, 704 280, 788 300
             L 788 712
             C 704 692, 594 698, 512 744 Z"
          fill="url(#page)"/>
    <!-- spine -->
    <rect x="500" y="332" width="24" height="412" rx="12" fill="#cdddef"/>
    <!-- left text lines (curved to match page) -->
    <g stroke="#9fc0e6" stroke-width="18" stroke-linecap="round" fill="none">
      <path d="M300 380 Q 376 372 452 392"/>
      <path d="M300 440 Q 376 432 452 452"/>
      <path d="M300 500 Q 376 492 452 512"/>
      <path d="M300 560 Q 376 552 452 572"/>
    </g>
    <!-- right text lines (curved to match page) -->
    <g stroke="#9fc0e6" stroke-width="18" stroke-linecap="round" fill="none">
      <path d="M572 392 Q 648 372 724 380"/>
      <path d="M572 452 Q 648 432 724 440"/>
      <path d="M572 512 Q 648 492 724 500"/>
      <path d="M572 572 Q 648 552 724 560"/>
    </g>
  </g>

</svg>
